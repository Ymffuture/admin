<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <!-- Viewport -->
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
  />

  <!-- Title -->
  <title>KotaBites Admin Dashboard</title>

  <!-- SEO -->
  <meta
    name="description"
    content="KotaBites Admin Dashboard - Manage orders, customers, drivers, products, analytics, and business operations."
  />

  <meta
    name="keywords"
    content="KotaBites, Admin Dashboard, Food Delivery, Orders, Restaurant Management"
  />

  <meta name="author" content="KotaBites" />

  <!-- Theme -->
  <meta name="theme-color" content="purple" />

  <!-- Favicon -->
  <link rel="icon" href="/vite.svg" />
  <link rel="apple-touch-icon" href="/logo.png" />

  <!-- Open Graph -->
  <meta property="og:title" content="KotaBites Admin Dashboard" />
  <meta
    property="og:description"
    content="Manage your food delivery platform with powerful admin tools."
  />
  <meta property="og:image" content="/logo.png" />
  <meta property="og:type" content="website" />

  <!-- Microsoft Clarity -->
  <script type="text/javascript">
    (function (c, l, a, r, i, t, y) {
      c[a] =
        c[a] ||
        function () {
          (c[a].q = c[a].q || []).push(arguments);
        };
      t = l.createElement(r);
      t.async = 1;
      t.src = "https://www.clarity.ms/tag/" + i;
      y = l.getElementsByTagName(r)[0];
      y.parentNode.insertBefore(t, y);
    })(window, document, "clarity", "script", "rv61d21r2n");
  </script>
</head>

<body>
  <noscript>
    You need to enable JavaScript to run this application.
  </noscript>

  <!-- Loading Screen -->
  <div id="loading-screen">
  <div class="loader-container">
    <div class="google-spinner"></div>

    <div class="loading-text">
      Loading Admin Dashboard
      <span class="dots">
        <i></i><i></i><i></i>
      </span>
    </div>
  </div>
</div>

<style>
  #loading-screen {
    position: fixed;
    inset: 0;
    background: #ffffff;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    animation: fadeIn 0.25s ease-in-out;
  }

  .loader-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }

  /* Google-style spinning ring */
  .google-spinner {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: 3px solid #e0e0e0;
    border-top-color: #4285f4;
    border-right-color: #ea4335;
    border-bottom-color: #fbbc05;
    border-left-color: #34a853;
    animation: spin 1s linear infinite;
  }

  .loading-text {
    font-size: 14px;
    font-weight: 500;
    color: #5f6368;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .dots i {
    width: 4px;
    height: 4px;
    margin-left: 2px;
    background: #5f6368;
    border-radius: 50%;
    display: inline-block;
    animation: bounce 1.2s infinite ease-in-out;
  }

  .dots i:nth-child(2) {
    animation-delay: 0.2s;
  }

  .dots i:nth-child(3) {
    animation-delay: 0.4s;
  }

  @keyframes spin {
    to {
      transform: rotate(360deg);
    }
  }

  @keyframes bounce {
    0%, 80%, 100% {
      transform: scale(0);
      opacity: 0.3;
    }
    40% {
      transform: scale(1);
      opacity: 1;
    }
  }

  @keyframes fadeIn {
    from {
      opacity: 0;
    }
    to {
      opacity: 1;
    }
  }
</style>

  <!-- React Root -->
  <div id="root"></div>

  <script type="module" src="/src/main.jsx"></script>

  <script>
    window.addEventListener("load", () => {
      const loader = document.getElementById("loading-screen");
      if (loader) loader.remove();
    });
  </script>
</body>
</html>
